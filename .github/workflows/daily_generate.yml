name: Daily Video Generation

on:
  schedule:
    - cron: '0 6 * * *'   # 6:00 AM UTC
  workflow_dispatch:
    inputs:
      skip_post:
        description: 'Skip TikTok posting (generation only)'
        required: false
        default: false
        type: boolean

jobs:
  generate_and_post:
    name: Generate videos and post to TikTok
    runs-on: ubuntu-latest
    timeout-minutes: 75

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          ffmpeg -version | head -1

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Create asset directories
        run: |
          mkdir -p assets/stock_videos
          mkdir -p assets/music
          mkdir -p assets/ready_videos
          mkdir -p assets/generated_audio
          mkdir -p assets/generated_text
          mkdir -p assets/generated_images
          mkdir -p assets/temp

      - name: Run video generation pipeline
        env:
          ELEVENLABS_API_KEYS: ${{ secrets.ELEVENLABS_API_KEYS }}
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_R2_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          CLOUDFLARE_R2_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_R2_BUCKET_NAME: ${{ secrets.CLOUDFLARE_R2_BUCKET_NAME }}
          CLOUDFLARE_R2_PUBLIC_URL: ${{ secrets.CLOUDFLARE_R2_PUBLIC_URL }}
        run: python monolith.py --no-images

      - name: Post next video from queue
        if: ${{ !inputs.skip_post }}
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_R2_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          CLOUDFLARE_R2_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_R2_BUCKET_NAME: ${{ secrets.CLOUDFLARE_R2_BUCKET_NAME }}
          CLOUDFLARE_R2_PUBLIC_URL: ${{ secrets.CLOUDFLARE_R2_PUBLIC_URL }}
          TIKTOK_SESSION_ID: ${{ secrets.TIKTOK_SESSION_ID }}
        run: python monolith.py --post-only

      - name: Upload generated videos as artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: videos-${{ github.run_number }}
          path: assets/ready_videos/*.mp4
          retention-days: 7
