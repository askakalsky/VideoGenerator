name: Daily Video Generation and Posting

on:
  schedule:
    - cron: '0 6 * * *'    # 6:00 UTC — generate + post #1
    - cron: '0 14 * * *'   # 14:00 UTC — post #2
    - cron: '0 22 * * *'   # 22:00 UTC — post #3
  workflow_dispatch:
    inputs:
      mode:
        description: 'What to run'
        required: false
        default: 'generate'
        type: choice
        options:
          - generate
          - post-only

jobs:
  generate:
    name: Generate videos
    runs-on: ubuntu-latest
    timeout-minutes: 75
    if: github.event_name == 'workflow_dispatch' && inputs.mode == 'generate' || github.event.schedule == '0 6 * * *'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Create asset directories
        run: |
          mkdir -p assets/stock_videos assets/music assets/ready_videos
          mkdir -p assets/generated_audio assets/generated_text assets/generated_images assets/temp

      - name: Generate videos
        env:
          ELEVENLABS_API_KEYS: ${{ secrets.ELEVENLABS_API_KEYS }}
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_R2_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          CLOUDFLARE_R2_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_R2_BUCKET_NAME: ${{ secrets.CLOUDFLARE_R2_BUCKET_NAME }}
          CLOUDFLARE_R2_PUBLIC_URL: ${{ secrets.CLOUDFLARE_R2_PUBLIC_URL }}
        run: python monolith.py --no-images

      - name: Upload videos as artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: videos-${{ github.run_number }}
          path: assets/ready_videos/*.mp4
          retention-days: 7

  post:
    name: Post to TikTok
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [generate]
    if: always() && (github.event_name == 'workflow_dispatch' && inputs.mode == 'post-only' || github.event.schedule == '0 6 * * *' || github.event.schedule == '0 14 * * *' || github.event.schedule == '0 22 * * *')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dotenv "boto3>=1.28.0,<1.35.0" tiktok-uploader playwright google-genai elevenlabs

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Post next video
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_R2_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          CLOUDFLARE_R2_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_R2_BUCKET_NAME: ${{ secrets.CLOUDFLARE_R2_BUCKET_NAME }}
          CLOUDFLARE_R2_PUBLIC_URL: ${{ secrets.CLOUDFLARE_R2_PUBLIC_URL }}
          TIKTOK_COOKIES: ${{ secrets.TIKTOK_COOKIES }}
          TIKTOK_SESSION_ID: ${{ secrets.TIKTOK_SESSION_ID }}
        run: python monolith.py --post-only
