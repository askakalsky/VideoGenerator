name: Daily Video Generation

on:
  schedule:
    - cron: '0 6 * * *'   # 6:00 AM UTC — генерация 3 частей
  workflow_dispatch:
    inputs:
      skip_post:
        description: 'Пропустить публикацию в TikTok (только генерация)'
        required: false
        default: false
        type: boolean

jobs:
  # ============================================================
  # Job 1: Генерация 3 видео + загрузка в R2 + добавление в очередь
  # ============================================================
  generate:
    name: Generate videos
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'project/requirements.txt'

      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          ffmpeg -version | head -1

      - name: Install Python dependencies
        run: pip install -r project/requirements.txt

      - name: Create asset directories
        run: |
          mkdir -p project/assets/stock_videos
          mkdir -p project/assets/music
          mkdir -p project/assets/ready_videos
          mkdir -p project/assets/generated_audio
          mkdir -p project/assets/generated_text
          mkdir -p project/assets/generated_images
          mkdir -p project/assets/temp

      - name: Run video generation pipeline
        working-directory: project
        env:
          ELEVENLABS_API_KEYS: ${{ secrets.ELEVENLABS_API_KEYS }}
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_R2_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          CLOUDFLARE_R2_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_R2_BUCKET_NAME: ${{ secrets.CLOUDFLARE_R2_BUCKET_NAME }}
          CLOUDFLARE_R2_PUBLIC_URL: ${{ secrets.CLOUDFLARE_R2_PUBLIC_URL }}
        run: python monolith.py --no-images

      - name: Upload generated videos as artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: videos-${{ github.run_number }}
          path: project/assets/ready_videos/*.mp4
          retention-days: 7

  # ============================================================
  # Job 2: Публикация следующего видео из очереди в TikTok
  # ============================================================
  post:
    name: Post to TikTok
    needs: generate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ !inputs.skip_post }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'project/requirements.txt'

      - name: Install dependencies
        run: pip install requests python-dotenv boto3 tiktok-uploader playwright

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Post next video from queue
        working-directory: project
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_R2_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          CLOUDFLARE_R2_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_R2_BUCKET_NAME: ${{ secrets.CLOUDFLARE_R2_BUCKET_NAME }}
          CLOUDFLARE_R2_PUBLIC_URL: ${{ secrets.CLOUDFLARE_R2_PUBLIC_URL }}
          TIKTOK_EMAIL: ${{ secrets.TIKTOK_EMAIL }}
          TIKTOK_PASSWORD: ${{ secrets.TIKTOK_PASSWORD }}
        run: python monolith.py --post-only
